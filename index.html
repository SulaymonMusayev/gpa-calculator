<!DOCTYPE html>
<html>
<head>
    <title>GPA Kalkulyator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
            background: #f0f2f5;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a73e8;
            text-align: center;
            font-size: 24px;
            margin: 0 0 20px 0;
        }
        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: nowrap;
        }
        .row input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            min-width: 0;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .delete-btn {
            background: #dc3545;
            padding: 10px 12px;
            font-size: 16px;
        }
        .add-btn {
            background: #28a745;
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        .run-btn {
            background: #1a73e8;
            width: 100%;
            margin: 20px 0;
            font-size: 20px;
            font-weight: bold;
            padding: 14px;
        }
        .result {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        .gpa {
            font-size: 48px;
            font-weight: bold;
            color: #1a73e8;
        }
        .formula {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 15px;
        }
        @media (max-width: 480px) {
            .row input {
                padding: 8px;
                font-size: 12px;
            }
            .delete-btn {
                padding: 8px 10px;
            }
            .gpa {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 GPA Kalkulyator</h1>
        
        <div class="result">
            <div>Sizning GPA</div>
            <div class="gpa" id="gpaResult">0.00</div>
        </div>
        
        <div id="entries">
            <div class="row">
                <input type="number" class="grade" placeholder="Baho (0-5)" value="" step="0.1" min="0" max="5">
                <input type="number" class="credit" placeholder="Kredit" value="" step="1" min="0">
                <button class="delete-btn" onclick="removeRow(this)">✖</button>
            </div>
        </div>
        
        <button class="add-btn" onclick="addRow()">+ Yana fan qo'shish</button>
        <button class="run-btn" onclick="calculateGPA()">🚀 RUN</button>
        
        <div class="formula">
            GPA = Σ(Kredit × Baho) / Σ(Kredit)
        </div>
    </div>

    <script>
        function calculateGPA() {
            let totalPoints = 0;
            let totalCredits = 0;
            
            const grades = document.querySelectorAll('.grade');
            const credits = document.querySelectorAll('.credit');
            
            for(let i = 0; i < grades.length; i++) {
                let grade = parseFloat(grades[i].value);
                let credit = parseFloat(credits[i].value);
                
                if(isNaN(grade)) grade = 0;
                if(isNaN(credit) || credit <= 0) credit = 0;
                
                if(grade < 0) grade = 0;
                if(grade > 5) grade = 5;
                
                totalPoints += grade * credit;
                totalCredits += credit;
            }
            
            let gpa = totalCredits > 0 ? totalPoints / totalCredits : 0;
            document.getElementById('gpaResult').innerText = gpa.toFixed(2);
        }
        
        function addRow() {
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `
                <input type="number" class="grade" placeholder="Baho (0-5)" value="" step="0.1" min="0" max="5">
                <input type="number" class="credit" placeholder="Kredit" value="" step="1" min="0">
                <button class="delete-btn" onclick="removeRow(this)">✖</button>
            `;
            document.getElementById('entries').appendChild(div);
        }
        
        function removeRow(btn) {
            const rows = document.querySelectorAll('.row');
            if (rows.length > 1) {
                btn.parentElement.remove();
            } else {
                alert("Kamida bitta fan qolishi kerak!");
            }
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateGPA();
            }
        });
    </script>
</body>
</html>
